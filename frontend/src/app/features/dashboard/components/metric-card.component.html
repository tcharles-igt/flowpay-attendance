<mat-card
  class="metric-card"
  [class.accent]="tone() === 'accent'"
  [class.warn]="tone() === 'warn'"
  [attr.title]="description()"
  [attr.aria-label]="title() + ': ' + description()"
>
  <p class="metric-card__eyebrow">{{ title() }}</p>
  <strong class="metric-card__value">{{ value() }}</strong>
</mat-card>

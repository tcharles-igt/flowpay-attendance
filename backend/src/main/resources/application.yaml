server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: flowpay-attendance
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/flowpay_attendance}
    username: ${SPRING_DATASOURCE_USERNAME:flowpay}
    password: ${SPRING_DATASOURCE_PASSWORD:flowpay}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${SPRING_JPA_SHOW_SQL:true}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org.hibernate.SQL: ${LOGGING_LEVEL_ORG_HIBERNATE_SQL:INFO}
    org.flywaydb: ${LOGGING_LEVEL_ORG_FLYWAYDB:INFO}

app:
  attendance:
    max-simultaneous-per-attendant: 3

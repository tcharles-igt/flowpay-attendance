server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: flowpay-attendance
  datasource:
    url: jdbc:postgresql://localhost:5432/flowpay_attendance
    username: flowpay
    password: flowpay
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org.hibernate.SQL: INFO
    org.flywaydb: INFO

app:
  attendance:
    max-simultaneous-per-attendant: 3
